name: Publish Chrome Extension

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish after uploading to the Chrome Web Store
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build extension
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Package extension
        run: |
          cd dist
          zip -r ../linear-view-diff.zip .

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: linear-view-diff
          path: linear-view-diff.zip
          if-no-files-found: error

      - name: Upload to Chrome Web Store
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          npm exec --yes --package chrome-webstore-upload-cli -- chrome-webstore-upload upload \
            --source linear-view-diff.zip \
            --extension-id "$EXTENSION_ID" \
            --client-id "$CLIENT_ID" \
            --client-secret "$CLIENT_SECRET" \
            --refresh-token "$REFRESH_TOKEN"

      - name: Publish Chrome Web Store item
        if: github.event_name == 'release' || github.event.inputs.publish == 'true'
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          npm exec --yes --package chrome-webstore-upload-cli -- chrome-webstore-upload publish \
            --extension-id "$EXTENSION_ID" \
            --client-id "$CLIENT_ID" \
            --client-secret "$CLIENT_SECRET" \
            --refresh-token "$REFRESH_TOKEN"
